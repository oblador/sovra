name: CI

permissions: {}

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]
    paths-ignore: &paths-ignore
      - "**/*.md"
      - "!.github/workflows/ci.yml"
  push:
    branches:
      - main
    paths-ignore: *paths-ignore

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

defaults:
  run:
    shell: bash

jobs:
  test:
    name: Test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: oxc-project/setup-rust@v1.0.16
        with:
          # warm cache factory for all other CI jobs
          # cache `target` directory to avoid download crates
          save-cache: ${{ github.ref_name == 'main' }}
          cache-key: warm
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
      - name: Fixture workspace
        working-directory: fixtures/yarn-workspace
        run: yarn install --immutable
      - run: cargo check --locked
      - run: cargo test
      - run: git diff --exit-code # Must commit everything

  napi:
    name: Test NAPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oxc-project/setup-rust@v1.0.16
        with:
          save-cache: ${{ github.ref_name == 'main' }}
          cache-key: warm
      - uses: ./.github/actions/setup
      - run: yarn build
      - run: node --test napi/test/sanity.spec.mjs
      - run: git diff --exit-code # Must commit generated bindings (index.d.ts/index.js)
